name: Feature Request
description: Suggest a new feature or enhancement for @neondatabase/serverless
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Have you considered other approaches?

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe your use case and how this feature would help you.
      placeholder: How would this feature benefit your project?
    validations:
      required: true

  - type: textarea
    id: code-example
    attributes:
      label: Example API (optional)
      description: If you have an idea of how the API should look, provide an example
      placeholder: |
        ```typescript
        // Example of how you'd like to use the feature
        const result = await sql.newFeature(...);
        ```
      render: typescript

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples about the feature request here.
